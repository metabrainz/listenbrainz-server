{%- macro render_lp_image(x, y, width, height, transform, image) -%}
  {%- if image.entity_mbid -%}
  <a href="https://listenbrainz.org/release/{{ image.entity_mbid }}" target="_blank">
  {%- endif -%}
    <image
        x="{{ x }}"
        y="{{ y }}"
        width="{{ width }}"
        height="{{ height }}"
        preserveAspectRatio="xMidYMid slice"
        href="{{ image.url }}"
        transform="{{ transform }}"
    >
        {%- if image.title and image.artist -%}
        <title>
          {{- image.title|escape ~ " - " ~ image.artist|escape -}}
        </title>
        {%- endif -%}
    </image>
  {%- if image.entity_mbid -%}
  </a>
  {%- endif -%}
{%- endmacro -%}
<svg version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     width="{{ width }}" height="{{ height }}"
     viewBox="0 0 {{ width }} {{ height }}"
     preserveAspectRatio="xMinYMin meet"
>
    <title>Top 5 releases {{ metadata["time_range"] }} for {{ metadata["user_name"] }}&#xA;</title>
    <desc>
        {%- for release in releases[:5] -%}
            {{- loop.index -}}. {{ release.release_name }} - {{ release.artist_name }}&#xA;
        {%- endfor -%}
    </desc>
    <style>
        .background-image {
            pointer-events: none;
        }
    </style>
    <defs>
        <filter id="colorizePlayer">
            <feColorMatrix type="matrix" values="0 0 0 {{ player_color_r }} 0
                                                 0 0 0 {{ player_color_g }} 0
                                                 0 0 0 {{ player_color_b }} 0
                                                 0 0 0 1 0" />
        </filter>
    </defs>

    <!-- Layer 1: Album Art -->
    {{ render_lp_image(89, 318, 195, 195, "rotate(6.1)", images[2]) }}
    {{ render_lp_image(17, 223, 193, 193, "rotate(-22.4)", images[1]) }}
    {{ render_lp_image(189, 240, 189, 189, "rotate(-4)", images[0]) }}
    {{ render_lp_image(404, 480, 198, 198, "rotate(-11.9)", images[4]) }}
    {{ render_lp_image(385, 488, 202, 203, "rotate(2.2)", images[3]) }}

    <!-- Layer 2: Scene Background -->
    <image x="0" y="0" width="1000" height="1000" href="{{ bg_url }}" class="background-image" />

    <!-- Layer 3: Wear & Tear -->
    {% if worn_url %}
    <image x="0" y="0" width="1000" height="1000" href="{{ worn_url }}" class="background-image" />
    {% endif %}

    <!-- Layer 4: Record Player Color Overlay -->
    <image x="0" y="0" width="1000" height="1000" href="{{ player_color_url }}"
           filter="url(#colorizePlayer)" style="mix-blend-mode: multiply;" class="background-image" />
</svg>
