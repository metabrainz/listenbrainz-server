[uwsgi]
uid = www-data
gid = www-data
master = true
socket = 0.0.0.0:3031
module = listenbrainz.api_compat
callable = application
chdir = /code/listenbrainz
enable-threads = true
processes = 10
; each worker imports the app after fork so the SQLAlchemy QueuePools are
; created per-worker (sharing a pool across forks corrupts sockets)
lazy-apps = true
log-x-forwarded-for=true
disable-logging = true
; quit uwsgi if the python app fails to load
need-app = true
die-on-term = true
safe-pidfile = /tmp/uwsgi-api-compat.pid
