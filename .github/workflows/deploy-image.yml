name: Build and publish image to Docker Hub

on:
  release:
    types: [published]

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
        
    - name: Build and push Docker images
      uses: docker/build-push-action@v4
      with:
        build-args: GIT_COMMIT_SHA=${{ github.ref_name }}
        cache-from: metabrainz/listenbrainz:cache
        # use mode=max to cache intermediate layers as well
        cache-to: type=registry,mode=max,oci-mediatypes=true,compression=zstd,compression-level=7,ref=metabrainz/listenbrainz:cache
        push: true
        tags: metabrainz/listenbrainz:${{ github.ref_name }}
        target: listenbrainz-prod

    - name: Export static assets
      uses: docker/build-push-action@v4
      with:
        build-args: GIT_COMMIT_SHA=${{ github.ref_name }}
        cache-from: metabrainz/listenbrainz:cache
        outputs: type=local,dest=/tmp/listenbrainz-static
        target: listenbrainz-static-assets

    - name: Write StaticBrainz SSH key
      run: |
        install -m 700 -d ~/.ssh
        printf '%s\n' '${{ secrets.STATICBRAINZ_SSH_PRIVATE_KEY }}' > ~/.ssh/rsync-listenbrainz-staticbrainz
        chmod 600 ~/.ssh/rsync-listenbrainz-staticbrainz

    - name: Upload static assets to StaticBrainz
      env:
        STATICBRAINZ_SERVERS: ${{ vars.STATICBRAINZ_SERVERS }}
        RSYNC_STATICBRAINZ_KEY: ~/.ssh/rsync-listenbrainz-staticbrainz
        STATICBRAINZ_SOURCE_DIR: /tmp/listenbrainz-static
        STATICBRAINZ_DESTINATION_DIR: ./prod/
        STATICBRAINZ_PRECOMPRESS: "1"
      run: ./admin/rsync-staticbrainz-files.sh
